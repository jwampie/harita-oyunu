<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dünya Haritası Oyunu - 196 Ülkeyi Tahmin Et</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .game-info {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .info-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border-left: 4px solid #667eea;
        }

        .info-box h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 0.9em;
            text-transform: uppercase;
        }

        .info-box .value {
            font-size: 2.5em;
            font-weight: bold;
            color: #333;
        }

        .game-area {
            background: #f0f0f0;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .map-placeholder {
            width: 100%;
            height: 400px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600"><rect fill="%23e8f4f8" width="1000" height="600"/><text x="500" y="300" font-size="24" text-anchor="middle" fill="%23999">🌍 Harita Alanı</text></svg>');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            margin-bottom: 20px;
            border-radius: 10px;
        }

        .input-section {
            margin-bottom: 20px;
        }

        .input-section input {
            width: 100%;
            padding: 15px;
            font-size: 1em;
            border: 2px solid #ddd;
            border-radius: 8px;
            transition: border-color 0.3s;
        }

        .input-section input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 15px;
            font-size: 1.1em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .stat-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #667eea;
        }

        .reset-btn {
            background: #6c757d;
            margin-top: 15px;
        }

        .reset-btn:hover {
            box-shadow: 0 10px 20px rgba(108, 117, 125, 0.3);
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            .game-info {
                grid-template-columns: 1fr;
            }

            .map-placeholder {
                height: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 Dünya Haritası Oyunu</h1>
        <p class="subtitle">196 Ülkeyi Tahmin Et!</p>

        <div class="game-info">
            <div class="info-box">
                <h3>Toplam Ülke</h3>
                <div class="value">196</div>
            </div>
            <div class="info-box">
                <h3>Bulunan</h3>
                <div class="value" id="found">0</div>
            </div>
            <div class="info-box">
                <h3>İlerleme</h3>
                <div class="value" id="progress">0%</div>
            </div>
        </div>

        <div class="game-area">
            <div class="map-placeholder"></div>
            <div class="input-section">
                <input type="text" id="countryInput" placeholder="Ülke adını yazın (Türkiye, İngiltere, vb.)..." autocomplete="off">
            </div>
            <button onclick="guessCountry()">Tahmin Et</button>
            <div class="message" id="message"></div>

            <div class="stats">
                <div class="stat-item">
                    <div class="stat-label">Doğru Tahmin</div>
                    <div class="stat-value" id="correct">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Yanlış Tahmin</div>
                    <div class="stat-value" id="wrong">0</div>
                </div>
            </div>

            <button class="reset-btn" onclick="resetGame()">Oyunu Yeniden Başlat</button>
        </div>
    </div>

    <script>
        // Ülke listesi
        const countries = [
            'Türkiye', 'İngiltere', 'Fransa', 'Almanya', 'İtalya', 'İspanya', 'Portekiz', 'Yunanistan', 'Polonya', 'Romanya',
            'Bulguristan', 'Sırbistan', 'Hırvatistan', 'Slovenya', 'Avusturya', 'Macaristan', 'Çekya', 'Slovakya', 'Ukrayna', 'Beyaz Rusya',
            'Rusya', 'Estonya', 'Letonya', 'Litvanya', 'İzlanda', 'İrlanda', 'Hollanda', 'Belçika', 'Lüksemburg', 'İsviçre',
            'Liechtenstein', 'Monako', 'San Marino', 'Vatikan', 'Andorra', 'Malta', 'Kıbrıs', 'Danimarka', 'İsveç', 'Norveç',
            'Finlandiya', 'ABD', 'Kanada', 'Meksika', 'Guatemala', 'Belize', 'El Salvador', 'Honduras', 'Nikaragua', 'Kosta Rika',
            'Panama', 'Kolombiya', 'Venezuela', 'Guyananın', 'Surinam', 'Fransız Guyanası', 'Ekvador', 'Peru', 'Brezilya', 'Bolivya',
            'Şili', 'Arjantin', 'Paraguay', 'Uruguay', 'Japonya', 'Güney Kore', 'Kuzey Kore', 'Çin', 'Moğolistan', 'Kazakistan',
            'Özbekistan', 'Türkmenistan', 'Kırgızistan', 'Tacikistan', 'Afganistan', 'Pakistan', 'Hindistan', 'Nepal', 'Bhutan', 'Bangladeş',
            'Myanmar', 'Tayland', 'Laos', 'Kamboçya', 'Vietnam', 'Malezya', 'Singapur', 'Endonezya', 'Timor Doğu', 'Filipinler',
            'Brunei', 'Avustralya', 'Yeni Zelanda', 'Fiji', 'Samoa', 'Kiribati', 'Marshall Adaları', 'Mikronezya', 'Palau', 'Tonga',
            'Vanuatu', 'Solomon Adaları', 'Tuvalu', 'Nauru', 'Myanmar', 'Tayland', 'Kamboçya', 'Laos', 'Vietnam', 'Malezya',
            'Mısır', 'Lübnan', 'Suriye', 'Irak', 'İran', 'Suudi Arabistan', 'Yemen', 'Umman', 'Birleşik Arap Emirlikleri', 'Katar',
            'Bahreyn', 'Kuveyt', 'Ürdün', 'İsrail', 'Filistin', 'Türkmenistan', 'Kazakistan', 'Özbekistan', 'Kırgızistan', 'Tacikistan',
            'Afganistan', 'Tunus', 'Cezayir', 'Fas', 'Libya', 'Sudan', 'Güney Sudan', 'Etiyopya', 'Eritre', 'Djibouti',
            'Somali', 'Kenya', 'Uganda', 'Tanzanya', 'Ruanda', 'Burundi', 'Demokratik Kongo', 'Kongo', 'Gabon', 'Kamerun',
            'Merkezi Afrika Cumhuriyeti', 'Çad', 'Nijer', 'Mali', 'Mauritanya', 'Senegal', 'Gine-Bissau', 'Gine', 'Sierra Leone', 'Liberya',
            'Fildişi Sahili', 'Mali', 'Burkina Faso', 'Gana', 'Togo', 'Benin', 'Nijerya', 'Kamerun', 'Ekvatorial Gine', 'Sao Tome ve Prinsipe',
            'Seychelles', 'Mauritius', 'Komor', 'Madagaskar', 'Mozambik', 'Malawi', 'Zambiya', 'Zimbabwe', 'Botswana', 'Namibya',
            'Güney Afrika', 'Eswatini', 'Lesoto', 'Angola', 'Zambia', 'Zimbabwe', 'Botswana', 'Namibya', 'Güney Afrika', 'Eswatini'
        ];

        let foundCountries = [];
        let correctCount = 0;
        let wrongCount = 0;

        function guessCountry() {
            const input = document.getElementById('countryInput');
            const country = input.value.trim();
            const messageEl = document.getElementById('message');

            if (!country) {
                showMessage('Lütfen bir ülke adı yazın!', 'error');
                return;
            }

            const normalizedCountry = country.toLowerCase().trim();
            const exists = countries.some(c => c.toLowerCase() === normalizedCountry);

            if (!exists) {
                showMessage('❌ Bu ülke listeye dahil değil!', 'error');
                wrongCount++;
            } else if (foundCountries.includes(normalizedCountry)) {
                showMessage('⚠️ Bu ülkeyi zaten bulmuşsunuz!', 'error');
            } else {
                showMessage('✅ Doğru! ' + country + ' bulundu!', 'success');
                foundCountries.push(normalizedCountry);
                correctCount++;
            }

            updateStats();
            input.value = '';
            input.focus();
        }

        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = 'message ' + type;
            setTimeout(() => {
                messageEl.className = 'message';
            }, 3000);
        }

        function updateStats() {
            document.getElementById('found').textContent = foundCountries.length;
            document.getElementById('correct').textContent = correctCount;
            document.getElementById('wrong').textContent = wrongCount;
            const progress = Math.round((foundCountries.length / 196) * 100);
            document.getElementById('progress').textContent = progress + '%';
        }

        function resetGame() {
            foundCountries = [];
            correctCount = 0;
            wrongCount = 0;
            updateStats();
            document.getElementById('countryInput').value = '';
            document.getElementById('countryInput').focus();
        }

        // Enter tuşu ile tahmin et
        document.getElementById('countryInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                guessCountry();
            }
        });

        // Sayfayı açtığında input'a focus ver
        document.getElementById('countryInput').focus();
    </script>
</body>
</html>
